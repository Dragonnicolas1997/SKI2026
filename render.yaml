services:
  - type: web
    name: bingo-ski
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GAME_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: DATABASE_URL
        value: sqlite:////data/bingo.db
    disk:
      name: bingo-data
      mountPath: /data
      sizeGB: 1
